# 1. HTTP Server - Port 80 (Challenge + Redirect)
server {
    listen 80;
    listen [::]:80;
    server_name app.emhug.org;

    # ACME-challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server - Port 443 (The Real Production App)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.emhug.org;

    # Point to the public folder of your Laravel app
    root /var/www/html/public;
    index index.php index.html;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/app.emhug.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.emhug.org/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Main Routing Logic - This fixes 404s on page refresh
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Processing
    location ~ \.php$ {
        fastcgi_pass safespace-app:9000;
        # Using $realpath_root is more robust in Docker
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
    }

    # Laravel Reverb / WebSockets
    location ~ ^/(app|reverb) {
        proxy_pass http://safespace-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ /(storage|bootstrap/cache) { deny all; }

    client_max_body_size 100M;
}
