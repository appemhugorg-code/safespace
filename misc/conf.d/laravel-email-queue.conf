[program:laravel-email-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/safespace/artisan queue:work --queue=emails --sleep=3 --tries=3 --max-time=1800
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-email-queue.log
stopwaitsecs=1800
