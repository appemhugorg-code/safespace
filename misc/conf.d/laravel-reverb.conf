[program:laravel-reverb]
command=php /var/www/safespace/artisan reverb:start --host=127.0.0.1 --port=8080 --no-interaction
#command=php /var/www/safespace/artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/reverb.log
stderr_logfile=/var/log/supervisor/reverb.error.log
startretries=3
startsecs=5
priority=999
