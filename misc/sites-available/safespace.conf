# 1. Redirect HTTP to HTTPS
server {
    listen 80;
    server_name app.emhug.org;
    return 301 https://$host$request_uri;
}

# 2. Main HTTPS Server Block
server {
    listen 443 ssl;
    server_name app.emhug.org;

    # Paths to your existing certificate files
    ssl_certificate /etc/letsencrypt/live/app.emhug.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.emhug.org/privkey.pem;

    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    root /var/www/safespace/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel Reverb Proxy (terminates SSL here)
    location ~ ^/(app|apps)/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

    	# Recommended additional headers for Laravel
    	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   	proxy_set_header X-Forwarded-Proto $scheme;
    	proxy_set_header X-Forwarded-Port $server_port;

    	# Optional: Increase timeouts for long-lived WebSocket connections
    	proxy_connect_timeout 60s;
    	proxy_send_timeout 60s;
    	proxy_read_timeout 3600s; # Keep open for 1 hour of inactivity

	# Proxy to Reverb running internally on 8080 without SSL
        proxy_pass http://127.0.0.1:8080;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    }
}
